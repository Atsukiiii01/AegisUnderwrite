<!DOCTYPE html>
<html>
<head><title>Aegis OSINT Scan</title><link rel="stylesheet" href="/static/style.css"></head>
<body>
<div class="container">
    <h2>Target Acquisition</h2>
    <form method="post" action="/underwrite">
        <label>Target Domain (e.g., example.com)</label>
        <input type="text" name="domain" required>
        <label>Industry</label>
        <select name="industry" required>
            <option value="finance">Finance</option><option value="healthcare">Healthcare</option>
            <option value="technology">Technology</option><option value="other">Other</option>
        </select>
        <label>Employee Count</label>
        <input type="number" name="employee_count" value="100" required>
        <label>Data Sensitivity</label>
        <select name="data_sensitivity" required>
            <option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option>
        </select>
        <label>Previous Incidents</label>
        <input type="number" name="previous_incidents" value="0" required>
        <button type="submit">Deploy Scan & Underwrite</button>
    </form>
</div>
</body>
</html>
