<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
</head>
<body>
<h2>Admin Panel</h2>

<h3>Create User</h3>
<form method="post" action="/admin/create">
    <input name="username" placeholder="Username" required>
    <input name="password" placeholder="Temp Password" required>
    <select name="role">
        <option value="UNDERWRITER">Underwriter</option>
        <option value="VIEWER">Viewer</option>
    </select>
    <button type="submit">Create</button>
</form>

<hr>

<h3>Users</h3>
<table border="1" cellpadding="6">
<tr>
    <th>Username</th>
    <th>Role</th>
    <th>Status</th>
    <th>Action</th>
</tr>

{% for user in users %}
<tr>
    <td>{{ user.username }}</td>
    <td>{{ user.role }}</td>
    <td>
        {% if user.is_active %}
            Active
        {% else %}
            Deactivated
        {% endif %}
    </td>
    <td>
        {% if user.is_active and user.role != "ADMIN" %}
        <form method="post" action="/admin/deactivate/{{ user.username }}">
            <button type="submit">Deactivate</button>
        </form>
        {% else %}
            —
        {% endif %}
    </td>
</tr>
{% endfor %}
</table>

<br>
<form method="post" action="/logout">
    <button>Logout</button>
</form>
</body>
</html>
